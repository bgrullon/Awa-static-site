<svg xmlns="http://www.w3.org/2000/svg" width="380" height="507" viewBox="0 0 380 507">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2e1050"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#8b3fc8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b3fc8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="380" height="507" fill="url(#bg)"/>
  <rect width="380" height="507" fill="url(#glow)"/>
  <!-- Stars -->
  <circle cx="40" cy="60" r="1.5" fill="#c89ef5" opacity="0.7"/>
  <circle cx="320" cy="40" r="1" fill="#c89ef5" opacity="0.5"/>
  <circle cx="100" cy="120" r="1" fill="#e8d0ff" opacity="0.4"/>
  <circle cx="280" cy="90" r="1.5" fill="#c89ef5" opacity="0.6"/>
  <circle cx="60" cy="200" r="1" fill="#e8d0ff" opacity="0.3"/>
  <circle cx="340" cy="160" r="1" fill="#c89ef5" opacity="0.5"/>
  <circle cx="20" cy="300" r="1.5" fill="#e8d0ff" opacity="0.4"/>
  <circle cx="360" cy="280" r="1" fill="#c89ef5" opacity="0.6"/>
  <!-- Moon crescent -->
  <circle cx="190" cy="85" r="38" fill="#e8d0ff" opacity="0.12"/>
  <circle cx="205" cy="78" r="32" fill="#0d0820"/>
  <!-- Witch hat -->
  <polygon points="190,30 155,115 225,115" fill="#1a0a30" stroke="#7b2fbe" stroke-width="1.5"/>
  <rect x="140" y="112" width="100" height="14" rx="4" fill="#2a1050" stroke="#7b2fbe" stroke-width="1.2"/>
  <!-- Hat band with buckle -->
  <rect x="163" y="113" width="54" height="8" rx="2" fill="#4a1880"/>
  <rect x="184" y="111" width="12" height="12" rx="2" fill="none" stroke="#c89ef5" stroke-width="1.5"/>
  <!-- Face silhouette -->
  <ellipse cx="190" cy="168" rx="38" ry="44" fill="#1e0d38"/>
  <!-- Hair flowing -->
  <path d="M152,155 Q130,220 140,290 Q160,310 162,290 Q150,240 155,200 Q160,175 152,155Z" fill="#0d0820"/>
  <path d="M228,155 Q250,220 240,290 Q220,310 218,290 Q230,240 225,200 Q220,175 228,155Z" fill="#0d0820"/>
  <!-- Flowing dark curls -->
  <path d="M140,290 Q125,330 135,360 Q150,370 148,350 Q140,325 145,300Z" fill="#0d0820"/>
  <path d="M240,290 Q255,330 245,360 Q230,370 232,350 Q240,325 235,300Z" fill="#0d0820"/>
  <!-- Eyes (glowing purple) -->
  <ellipse cx="174" cy="165" rx="8" ry="5" fill="#6b21a8"/>
  <ellipse cx="206" cy="165" rx="8" ry="5" fill="#6b21a8"/>
  <circle cx="174" cy="165" r="4" fill="#a855f7"/>
  <circle cx="206" cy="165" r="4" fill="#a855f7"/>
  <circle cx="175" cy="164" r="1.5" fill="#f0e0ff"/>
  <circle cx="207" cy="164" r="1.5" fill="#f0e0ff"/>
  <!-- Lips -->
  <path d="M181,185 Q190,191 199,185" fill="none" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
  <!-- Small star/sparkle on cheek -->
  <text x="215" y="182" font-size="10" fill="#c89ef5" opacity="0.7">✦</text>
  <!-- Body / cloak -->
  <path d="M150,210 Q100,280 95,380 L285,380 Q280,280 230,210 Q210,200 190,198 Q170,200 150,210Z" fill="#1a0a30" stroke="#4a1880" stroke-width="1"/>
  <!-- Cloak trim -->
  <path d="M150,210 Q120,260 110,340" fill="none" stroke="#7b2fbe" stroke-width="1.5" opacity="0.6"/>
  <path d="M230,210 Q260,260 270,340" fill="none" stroke="#7b2fbe" stroke-width="1.5" opacity="0.6"/>
  <!-- Pentagram pendant -->
  <text x="183" y="270" font-size="18" fill="#9b6fc4" opacity="0.8">⛤</text>
  <!-- Hands holding grimoire / spell book -->
  <rect x="155" y="310" width="70" height="55" rx="4" fill="#0f0820" stroke="#6b21a8" stroke-width="1.5"/>
  <line x1="155" y1="337" x2="225" y2="337" stroke="#6b21a8" stroke-width="1" opacity="0.5"/>
  <text x="178" y="358" font-size="14" fill="#a855f7" opacity="0.6">✦</text>
  <!-- Bottom decorative label -->
  <rect x="0" y="460" width="380" height="47" fill="#0a0618" opacity="0.85"/>
  <text x="190" y="485" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#c89ef5" letter-spacing="2">ADVENTURE WITH ARADIA</text>
  <text x="190" y="502" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#7a50a0" letter-spacing="1">✦  YOUR GOTH WITCH GM  ✦</text>
</svg>
